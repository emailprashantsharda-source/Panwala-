<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DukaaBook — Smart Shop Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --p:#f97316;--pd:#c2410c;--pl:#fff7ed;
  --s:#16a34a;--sl:#f0fdf4;
  --bg:#f1f5f9;--card:#fff;
  --t1:#0f172a;--t2:#64748b;--t3:#94a3b8;
  --border:#e2e8f0;
  --r1:14px;--r2:20px;--r3:28px;
  --sh1:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);
  --sh2:0 8px 24px rgba(0,0,0,.08);
  --f:"Plus Jakarta Sans",system-ui,sans-serif
}
.pf-grocery{--p:#16a34a;--pd:#15803d;--pl:#f0fdf4}
.pf-teashop{--p:#d97706;--pd:#b45309;--pl:#fffbeb}
.pf-barber{--p:#7c3aed;--pd:#6d28d9;--pl:#f5f3ff}
.pf-dhaba{--p:#dc2626;--pd:#b91c1c;--pl:#fef2f2}
.pf-medical{--p:#0891b2;--pd:#0e7490;--pl:#ecfeff}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--f);background:var(--bg);max-width:600px;margin:0 auto;min-height:100vh;font-size:16px;color:var(--t1);-webkit-font-smoothing:antialiased}
button,input,select,textarea{font-family:var(--f);-webkit-appearance:none;outline:none;border:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
button{cursor:pointer;transition:transform .12s,opacity .12s}
button:active{transform:scale(.96)}
a{text-decoration:none}
.page{display:none;padding-bottom:90px}
.page.active{display:block;animation:fadeUp .28s cubic-bezier(.22,1,.36,1) both}
.card{background:var(--card);border-radius:var(--r2);padding:18px;box-shadow:var(--sh1);margin-bottom:12px}
.inp{width:100%;border:1.5px solid var(--border);border-radius:var(--r1);padding:14px 16px;font-size:16px;font-weight:500;background:#fafafa;color:var(--t1);display:block;margin-bottom:12px;transition:border-color .18s,box-shadow .18s}
.inp:focus{border-color:var(--p);background:#fff;outline:none}
.lbl{display:block;font-size:13px;font-weight:700;color:var(--t2);margin-bottom:5px;letter-spacing:.02em}
.pbtn{width:100%;padding:16px;border-radius:var(--r1);font-weight:800;font-size:16px;color:#fff;display:block;text-align:center;margin-top:8px;background:linear-gradient(135deg,var(--p),var(--pd));box-shadow:0 4px 16px rgba(0,0,0,.12);border:none}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.hs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.hs::-webkit-scrollbar{display:none}
.go{background:linear-gradient(145deg,var(--p),var(--pd))}
.gp{background:linear-gradient(135deg,#7c3aed,#6d28d9)}
.ga{background:linear-gradient(135deg,#d97706,#b45309)}
.gc{background:linear-gradient(135deg,#0891b2,#0e7490)}
.gr{background:linear-gradient(135deg,#dc2626,#b91c1c)}
.gg{background:linear-gradient(135deg,#16a34a,#15803d)}
.gs{background:linear-gradient(135deg,#475569,#334155)}
#nav{position:fixed;bottom:0;left:0;right:0;max-width:600px;margin:0 auto;background:rgba(255,255,255,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 -1px 0 rgba(0,0,0,.06),0 -4px 20px rgba(0,0,0,.06);display:flex;z-index:200}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;gap:2px;background:none;color:var(--t3);position:relative;font-size:10px;font-weight:700;letter-spacing:.03em;border:none}
.nt.on{color:var(--p)}
.ntb{position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:3px;border-radius:0 0 6px 6px;background:var(--p);display:none}
.nt.on .ntb{display:block}
.ni{font-size:22px;line-height:1.1}
#ov{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:300;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
#ov.show{display:flex}
#md{background:#fff;width:100%;max-width:600px;border-radius:28px 28px 0 0;max-height:92vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.22,1,.36,1) both}
#mh{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 16px;position:sticky;top:0;background:#fff;z-index:1;border-bottom:1px solid var(--border)}
#mh b{font-size:17px;font-weight:800;color:var(--t1)}
#mc{width:32px;height:32px;border-radius:50%;background:#f1f5f9;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--t2);font-weight:800;border:none}
#mb{padding:20px}
#toast{display:none;position:fixed;top:22px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:13px 22px;border-radius:99px;font-weight:700;font-size:14px;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,.22);max-width:92vw;text-align:center}
#cb{display:none;position:fixed;bottom:68px;left:0;right:0;max-width:600px;margin:0 auto;z-index:150}
#ci{background:#fff;border-top:1px solid var(--border);padding:12px 16px;max-height:180px;overflow-y:auto;display:none}
#cf{background:rgba(255,255,255,.96);backdrop-filter:blur(16px);padding:12px 16px;box-shadow:0 -2px 20px rgba(0,0,0,.09);display:flex;align-items:center;gap:12px;border-top:1px solid var(--border)}
#onboarding{display:none;position:fixed;inset:0;background:#fff;z-index:500;flex-direction:column;align-items:center;overflow-y:auto}
.prof-tile{background:#fff;border-radius:20px;padding:18px 10px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:var(--sh1);border:2px solid transparent;transition:all .2s}
.prof-tile.sel{border-color:var(--p);background:var(--pl)}
.prof-tile .ico{width:56px;height:56px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px}
.prof-tile .lbl2{font-size:12px;font-weight:700;text-align:center;color:var(--t1);line-height:1.3}
.step{width:8px;height:8px;border-radius:50%;background:var(--border);transition:all .3s}
.step.active{width:28px;border-radius:4px;background:var(--p)}
.bt{background:#fff;border-radius:var(--r2);padding:14px;cursor:pointer;border:1.5px solid var(--border);position:relative;display:flex;flex-direction:column;justify-content:space-between;min-height:110px;transition:border-color .15s,transform .12s;box-shadow:var(--sh1)}
.bt.in-cart{border-color:var(--p);background:var(--pl)}
.bt:active{transform:scale(.94)}
.bt-badge{position:absolute;top:-10px;right:-10px;width:26px;height:26px;border-radius:50%;background:var(--p);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
.cat-pill{flex-shrink:0;padding:9px 16px;border-radius:99px;font-size:13px;font-weight:700;white-space:nowrap;transition:all .15s;border:none}
.pay-btn{flex:2;padding:16px 8px;border-radius:16px;font-weight:800;color:#fff;font-size:14px;display:flex;flex-direction:column;align-items:center;gap:2px;border:none}
.pay-btn .sub{font-size:12px;font-weight:600;opacity:.85}
.rev-box{background:rgba(255,255,255,.16);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:18px}
.stat-card{background:var(--card);border-radius:var(--r2);padding:18px;box-shadow:var(--sh1);cursor:pointer;transition:transform .15s;border:none}
.stat-card:active{transform:scale(.97)}
.receipt-line{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed var(--border);font-size:14px}
.receipt-total{display:flex;justify-content:space-between;padding:16px 0 0;font-weight:800;font-size:20px;border-top:2px solid var(--t1);margin-top:6px}
.qa-tile{background:#fff;border-radius:var(--r2);padding:14px 6px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:var(--sh1);border:none;transition:transform .12s}
.qa-tile:active{transform:scale(.93)}
.qa-icon{width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px}
.qa-lbl{font-size:11px;font-weight:700;text-align:center;color:var(--t1);line-height:1.3}
.more-tile{background:#fff;border-radius:var(--r2);padding:16px;display:flex;flex-direction:column;align-items:flex-start;gap:8px;box-shadow:var(--sh1);border:none;text-align:left;width:100%;position:relative;overflow:hidden;transition:transform .12s}
.more-tile:active{transform:scale(.96)}
.more-icon{width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px}
.alert-dot{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:#ef4444;color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center}
.chip{flex-shrink:0;padding:8px 14px;border-radius:22px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;border:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:translateX(-50%) scale(.85)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}50%{box-shadow:0 0 0 12px rgba(239,68,68,0)}}
.mic-active{animation:pulse-mic 1s infinite!important;background:#ef4444!important;color:#fff!important}
#toast{animation:popIn .22s cubic-bezier(.22,1,.36,1)}
</style>
</head>
<body>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ─── FIREBASE CONFIG (replace with your values) ───────────────
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  auth.useDeviceLanguage();

  // ─── RECAPTCHA ─────────────────────────────────────────────────
  function setupRecaptcha() {
    if (window.recaptchaVerifier) return;
    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
      size: 'invisible',
      callback: () => {},
      'expired-callback': () => {
        window.recaptchaVerifier = null;
      }
    });
  }

  // ─── SEND OTP ──────────────────────────────────────────────────
  window.sendOTP = async function() {
    const phone = document.getElementById('phone-input').value.trim();
    if (!/^[6-9]\d{9}$/.test(phone)) {
      showLoginError('Please enter a valid 10-digit Indian mobile number');
      return;
    }
    setLoginStatus('Sending OTP...', false);
    try {
      setupRecaptcha();
      const result = await signInWithPhoneNumber(auth, '+91' + phone, window.recaptchaVerifier);
      window.confirmationResult = result;
      document.getElementById('otp-section').style.display = 'block';
      document.getElementById('send-otp-btn').style.display = 'none';
      document.getElementById('phone-input').disabled = true;
      setLoginStatus('OTP sent to +91 ' + phone, false);
      document.getElementById('otp-input').focus();
    } catch (err) {
      console.error('sendOTP error:', err);
      window.recaptchaVerifier = null;
      showLoginError(friendlyError(err));
    }
  };

  // ─── VERIFY OTP ────────────────────────────────────────────────
  window.verifyOTP = async function() {
    const code = document.getElementById('otp-input').value.trim();
    if (code.length !== 6) {
      showLoginError('Enter the 6-digit OTP');
      return;
    }
    setLoginStatus('Verifying...', false);
    try {
      const result = await window.confirmationResult.confirm(code);
      const user = result.user;
      window.currentUserId = user.uid;
      await saveUserToFirestore(user);
      showApp();
    } catch (err) {
      console.error('verifyOTP error:', err);
      showLoginError(friendlyError(err));
    }
  };

  // ─── SAVE USER + SHOP TO FIRESTORE ─────────────────────────────
  async function saveUserToFirestore(user) {
    const userRef = doc(db, 'users', user.uid);
    const snap = await getDoc(userRef);
    if (!snap.exists()) {
      await setDoc(userRef, {
        phone: user.phoneNumber,
        createdAt: serverTimestamp()
      });
      // Create default shop for new user
      const shopRef = doc(db, 'shops', user.uid);
      await setDoc(shopRef, {
        ownerId: user.uid,
        name: 'My Pan Shop',
        createdAt: serverTimestamp()
      });
    }
  }

  // ─── AUTH STATE ────────────────────────────────────────────────
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.currentUserId = user.uid;
      showApp();
    } else {
      showLogin();
    }
  });

  // ─── UI HELPERS ────────────────────────────────────────────────
  function showApp() {
    // Delegate to window._showApp (defined in app script) so
    // initApp(), profession theme, and onboarding all run correctly.
    if (typeof window._showApp === 'function') {
      window._showApp();
    } else {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      if (typeof render === 'function') render();
    }
  }
  function showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
  function showLoginError(msg) {
    const el = document.getElementById('login-msg');
    el.textContent = msg;
    el.style.color = '#dc2626';
    el.style.background = '#fef2f2';
    el.style.borderColor = '#fecaca';
    el.style.display = 'block';
  }
  function setLoginStatus(msg, isError) {
    const el = document.getElementById('login-msg');
    el.textContent = msg;
    el.style.color = isError ? '#dc2626' : '#15803d';
    el.style.background = isError ? '#fef2f2' : '#f0fdf4';
    el.style.borderColor = isError ? '#fecaca' : '#bbf7d0';
    el.style.display = 'block';
  }
  function friendlyError(err) {
    const code = err.code || '';
    if (code.includes('invalid-phone')) return 'Invalid phone number format';
    if (code.includes('too-many-requests')) return 'Too many attempts. Please try after some time';
    if (code.includes('invalid-verification-code')) return 'Wrong OTP. Please check and try again';
    if (code.includes('code-expired')) return 'OTP expired. Please request a new one';
    if (code.includes('network')) return 'Network error. Check your internet connection';
    return err.message || 'Something went wrong. Please try again';
  }
</script>

<div id="login-screen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px 20px;background:linear-gradient(160deg,#0f172a 0%,#1e293b 55%,#0f172a 100%);position:relative;overflow:hidden">
  <div style="position:absolute;top:-100px;left:-80px;width:350px;height:350px;border-radius:50%;background:rgba(249,115,22,.1);filter:blur(70px);pointer-events:none"></div>
  <div style="position:absolute;bottom:-80px;right:-60px;width:300px;height:300px;border-radius:50%;background:rgba(99,102,241,.08);filter:blur(70px);pointer-events:none"></div>
  <div style="width:100%;max-width:380px;position:relative;z-index:1">
    <div style="text-align:center;margin-bottom:36px">
      <div style="width:76px;height:76px;border-radius:26px;background:linear-gradient(135deg,var(--p),var(--pd));display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 18px;box-shadow:0 8px 32px rgba(249,115,22,.35)">🏪</div>
      <h1 style="font-size:30px;font-weight:800;color:#fff;margin-bottom:6px;letter-spacing:-.03em">DukaaBook</h1>
      <p style="font-size:15px;color:#94a3b8;font-weight:500">Aapki dukaan, aapki marzi</p>
    </div>
    <div style="background:rgba(255,255,255,.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:28px">
      <div style="font-size:12px;font-weight:700;color:#64748b;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px">📱 Mobile Number</div>
      <div style="display:flex;gap:10px;margin-bottom:16px">
        <div style="padding:14px 16px;background:rgba(255,255,255,.08);border-radius:14px;border:1.5px solid rgba(255,255,255,.1);font-weight:800;font-size:16px;color:#fff;white-space:nowrap">+91</div>
        <input id="phone-input" type="tel" maxlength="10" placeholder="10-digit mobile"
          style="flex:1;padding:14px 16px;border:1.5px solid rgba(255,255,255,.1);border-radius:14px;font-size:16px;font-weight:600;background:rgba(255,255,255,.08);color:#fff;outline:none;caret-color:var(--p)"
          oninput="this.value=this.value.replace(/[^0-9]/g,'')"
          onkeydown="if(event.key==='Enter')window.sendOTP()"/>
      </div>
      <button id="send-otp-btn" onclick="window.sendOTP()"
        style="width:100%;padding:16px;border-radius:16px;font-weight:800;font-size:16px;color:#fff;background:linear-gradient(135deg,var(--p),var(--pd));box-shadow:0 6px 20px rgba(249,115,22,.4);letter-spacing:.02em;border:none">
        OTP Bhejein →
      </button>
      <div id="otp-section" style="display:none;margin-top:20px">
        <div style="height:1px;background:rgba(255,255,255,.08);margin-bottom:20px"></div>
        <div style="font-size:12px;font-weight:700;color:#64748b;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">🔑 Enter OTP</div>
        <input id="otp-input" type="number" placeholder="· · · · · ·"
          style="width:100%;padding:14px;border:1.5px solid rgba(255,255,255,.1);border-radius:14px;font-size:32px;font-weight:800;text-align:center;color:#fff;background:rgba(255,255,255,.08);outline:none;letter-spacing:14px;margin-bottom:14px;caret-color:var(--s)"
          oninput="this.value=this.value.slice(0,6)"
          onkeydown="if(event.key==='Enter')window.verifyOTP()"/>
        <button onclick="window.verifyOTP()"
          style="width:100%;padding:16px;border-radius:16px;font-weight:800;color:#fff;font-size:16px;background:linear-gradient(135deg,#16a34a,#15803d);box-shadow:0 6px 20px rgba(22,163,74,.4);margin-bottom:10px;border:none">
          ✓ Verify &amp; Login
        </button>
        <button onclick="resetLogin()"
          style="width:100%;padding:12px;border-radius:14px;font-size:14px;font-weight:600;color:#64748b;background:transparent;border:none">← Number badlein</button>
      </div>
      <div id="login-msg" style="display:none;margin-top:14px;padding:12px 16px;border-radius:12px;border:1.5px solid;font-size:14px;font-weight:600;text-align:center"></div>
      <div id="recaptcha-container"></div>
    </div>
    <p style="text-align:center;font-size:12px;color:#334155;margin-top:18px;line-height:1.6">🔒 Your data is safe and encrypted</p>
  </div>
</div>

<script>
function resetLogin(){
  document.getElementById("otp-section").style.display="none";
  document.getElementById("send-otp-btn").style.display="block";
  document.getElementById("phone-input").disabled=false;
  document.getElementById("phone-input").value="";
  document.getElementById("otp-input").value="";
  document.getElementById("login-msg").style.display="none";
  window.confirmationResult=null;window.recaptchaVerifier=null;
  document.getElementById("phone-input").focus();
}
function showLoginError(msg){
  var el=document.getElementById("login-msg");
  el.textContent=msg;el.style.color="#fca5a5";el.style.background="rgba(220,38,38,.12)";el.style.borderColor="rgba(220,38,38,.25)";el.style.display="block";
}
function setLoginStatus(msg,isErr){
  var el=document.getElementById("login-msg");
  el.textContent=msg;el.style.color=isErr?"#fca5a5":"#86efac";
  el.style.background=isErr?"rgba(220,38,38,.12)":"rgba(22,163,74,.12)";
  el.style.borderColor=isErr?"rgba(220,38,38,.25)":"rgba(22,163,74,.25)";
  el.style.display="block";
}
function friendlyError(err){
  var code=err.code||"";
  if(code.includes("invalid-phone"))return "Invalid phone number format";
  if(code.includes("too-many-requests"))return "Too many attempts. Please wait";
  if(code.includes("invalid-verification-code"))return "Wrong OTP. Try again";
  if(code.includes("code-expired"))return "OTP expired. Request new one";
  if(code.includes("network"))return "Network error. Check internet";
  return err.message||"Something went wrong. Try again";
}
</script>

<div id="onboarding" style="display:none;flex-direction:column;position:fixed;inset:0;z-index:500;background:#fff;overflow-y:auto">
  <div id="ob-step1" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:44px 20px 32px;min-height:100vh">
    <div style="width:100%;max-width:440px">
      <div style="text-align:center;margin-bottom:36px">

function aTC(pid){
  var p=S.prods.find(function(x){return x.id===pid;});

  var pc=gPC();
  if(pc.hasStock&&p.qty<=0)return;
  var ex=S.cart.find(function(i){return i.id===pid;});

  else{var i=S.cart.find(function(x){return x.id===pid;});if(i)i.q=q;}
  uCB();rCI();if(S.tab==="bill")rBillTiles();
}
function clC(){S.cart=[];uCB();if(S.tab==="bill")rBillTiles();}
function cT(){
  var base=S.cart.reduce(function(a,i){return a+i.sp*i.q;},0);

function cPr(){return S.cart.reduce(function(a,i){return a+(i.sp-i.cp)*i.q;},0);}

// ═══════════════════════════════════════════════════════════════════
var _voiceRecognition = null;
var _voiceActive = false;

function startVoiceBill() {
  if (!S.openAiKey) {
    oM("🧠 AI Setup Zaruri Hai",
      '<div style="text-align:center;padding:16px 0 8px">'
      +'<div style="font-size:48px;margin-bottom:12px">🔑</div>'
      +'<div style="font-weight:800;font-size:17px;color:var(--t1);margin-bottom:8px">OpenAI API Key Chahiye</div>'
      +'<div style="font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:20px">Settings mein OpenAI API key daalo, phir Voice Billing use kar sakte ho.</div>'
      +'<button class="pbtn" onclick="cM();S.sub=\'settings\';rMore()" style="background:linear-gradient(135deg,#7c3aed,#6d28d9)">⚙️ Settings Kholein</button>'
      +'</div>');
    return;
  }

  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    toast("Aapka browser voice ko support nahi karta. Chrome use karein. 🌐");
    return;
  }

  if (_voiceActive) {
    // Stop recording
    if (_voiceRecognition) _voiceRecognition.stop();
    return;
  }

  _voiceActive = true;
  var btn = document.getElementById("mic-btn");
  if (btn) { btn.textContent = "⏹ Stop"; btn.classList.add("mic-active"); }

  _voiceRecognition = new SpeechRecognition();
  _voiceRecognition.lang = "hi-IN";
  _voiceRecognition.continuous = false;
  _voiceRecognition.interimResults = false;

  _voiceRecognition.onresult = function(event) {
    var transcript = event.results[0][0].transcript;
    _voiceActive = false;
    var btn2 = document.getElementById("mic-btn");
    if (btn2) { btn2.textContent = "⏳ Samajh raha..."; btn2.classList.remove("mic-active"); }
    processVoiceOrder(transcript);
  };

  _voiceRecognition.onerror = function(err) {
    _voiceActive = false;
    var btn3 = document.getElementById("mic-btn");
    if (btn3) { btn3.textContent = "🎤 Voice"; btn3.classList.remove("mic-active"); }
    if (err.error === "no-speech") { toast("Kuch suna nahi. Dobara try karein! 🎤"); }
    else { toast("Voice error: " + err.error); }
  };

  _voiceRecognition.onend = function() {
    _voiceActive = false;
    var btn4 = document.getElementById("mic-btn");
    if (btn4 && btn4.textContent !== "⏳ Samajh raha...") {
      btn4.textContent = "🎤 Voice"; btn4.classList.remove("mic-active");
    }
  };

  _voiceRecognition.start();
  toast("🎤 Bol do — items aur quantity!");
}

function processVoiceOrder(transcript) {
  // Build product catalogue context
  var catalogue = S.prods.slice(0, 40).map(function(p) {
    return p.id + "|" + p.name + "|" + p.cat;
  }).join("
");

  var prompt =
    "You are a billing assistant for an Indian shop. The shopkeeper said (in Hindi/Hinglish/English):
"
    + """ + transcript + ""

"
    + "Available products (id|name|category):
" + catalogue + "

"
    + "Extract items and quantities from the speech. Match to available products.
"
    + "Return ONLY valid JSON array: [{"id":1,"qty":2},{"id":5,"qty":1}]
"
    + "If nothing matches, return []
"
    + "Common patterns: 'ek' or '1' = 1, 'do' or '2' = 2, 'teen' = 3, 'char' = 4, 'paanch' = 5";

  fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + S.openAiKey
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{ role: "user", content: prompt }],
      temperature: 0,
      max_tokens: 200
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var btn = document.getElementById("mic-btn");
    if (btn) { btn.textContent = "🎤 Voice"; btn.classList.remove("mic-active"); }

    var raw = (data.choices && data.choices[0] && data.choices[0].message.content) || "[]";
    raw = raw.replace(/```json|```/g, "").trim();
    var items;
    try { items = JSON.parse(raw); } catch(e) { items = []; }

    if (!items || !items.length) {
      toast("Kuch samajh nahi aaya: "" + transcript + "" 🤔");
      return;
    }

    var added = 0;
    items.forEach(function(item) {
      var prod = S.prods.find(function(p) { return p.id === item.id; });
      if (!prod) return;
      var qty = item.qty || 1;
      for (var i = 0; i < qty; i++) aTC(prod.id);
      added += qty;
    });

    if (added > 0) {
      toast("🎤 " + added + " item" + (added > 1 ? "s" : "") + " cart mein add ho gaye! "" + transcript + """);
    } else {
      toast("Products match nahi hue. Manual add karein 🛒");
    }
  })
  .catch(function(err) {
    var btn5 = document.getElementById("mic-btn");
    if (btn5) { btn5.textContent = "🎤 Voice"; btn5.classList.remove("mic-active"); }
    console.error("Voice GPT error:", err);
    toast("AI se connect nahi hua. Internet check karein ⚠️");
  });
}

// 📊 DAILY WA NARRATIVE — GPT-powered WhatsApp summary
// ═══════════════════════════════════════════════════════════════════
var _dailySummaryTimer = null;

function scheduleDailySummary() {
  // Clear existing timer
  if (_dailySummaryTimer) clearTimeout(_dailySummaryTimer);
  if (!S.dailySummary || !S.openAiKey || !S.ownerWa) return;

  // Calculate ms until 9 PM today (or tomorrow if past 9 PM)
  var now = new Date();
  var target = new Date();
  target.setHours(21, 0, 0, 0); // 9:00 PM
  if (now >= target) target.setDate(target.getDate() + 1);
  var msUntil = target - now;

  _dailySummaryTimer = setTimeout(function() {
    sendDailyWaSummary();
    // Re-schedule for next day
    _dailySummaryTimer = setTimeout(function() {
      scheduleDailySummary();
    }, 1000);
  }, msUntil);

  var hoursUntil = Math.round(msUntil / 3600000);
  console.log("Daily WA summary scheduled in " + hoursUntil + " hours");
}

function sendDailyWaSummary() {
  if (!S.openAiKey || !S.ownerWa) return;

  var day = td();
  var dS = S.sales.filter(function(s) { return s.date === day; });
  var rev  = dS.reduce(function(a,s) { return a + s.total; }, 0);
  var prof = dS.reduce(function(a,s) { return a + s.profit; }, 0);
  var exp  = (S.exps || []).filter(function(e) { return e.date === day; }).reduce(function(a,e) { return a + e.amt; }, 0);
  var net  = prof - exp;
  var cR   = dS.filter(function(s) { return s.pt === "cash"; }).reduce(function(a,s) { return a + s.total; }, 0);
  var uR   = dS.filter(function(s) { return s.pt === "upi"; }).reduce(function(a,s) { return a + s.total; }, 0);
  var udR  = dS.filter(function(s) { return s.pt === "udhar"; }).reduce(function(a,s) { return a + s.total; }, 0);

  // Top 3 items
  var itemCounts = {};
  dS.forEach(function(s) {
    (s.items || []).forEach(function(i) {
      var nm = i.name || "Item";
      itemCounts[nm] = (itemCounts[nm] || 0) + (i.qty || 1);
    });
  });
  var topItems = Object.entries(itemCounts)
    .sort(function(a,b) { return b[1]-a[1]; })
    .slice(0, 3)
    .map(function(x) { return x[0] + " (" + x[1] + ")"; })
    .join(", ");

  // Yesterday comparison
  var yday = new Date(); yday.setDate(yday.getDate()-1);
  var yStr = yday.toISOString().split("T")[0];
  var yS = S.sales.filter(function(s) { return s.date === yStr; });
  var yRev = yS.reduce(function(a,s) { return a + s.total; }, 0);
  var revDiff = yRev > 0 ? Math.round((rev - yRev) / yRev * 100) : 0;

  var pc = gPC();
  var dataStr =
    "Shop: " + S.store + " (" + pc.label + ")
"
    + "Date: " + new Date().toLocaleDateString("en-IN") + "
"
    + "Total Sales: Rs." + rev + " (" + dS.length + " bills)
"
    + "Net Profit: Rs." + net + "
"
    + "Cash: Rs." + cR + " | UPI: Rs." + uR + " | Udhar: Rs." + udR + "
"
    + "Top items: " + (topItems || "None") + "
"
    + "vs Yesterday: " + (revDiff >= 0 ? "+" : "") + revDiff + "%
"
    + "Udhar outstanding: Rs." + tUO();

  fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + S.openAiKey
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [{
        role: "user",
        content:
          "You are a friendly business advisor for an Indian shopkeeper. "
          + "Write a WhatsApp daily summary message in Hindi (Hinglish OK) — "
          + "warm, encouraging, and actionable. 4-6 lines max. "
          + "Include emojis. End with one tip for tomorrow.

"
          + "Today's data:
" + dataStr
      }],
      temperature: 0.7,
      max_tokens: 300
    })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var msg = data.choices && data.choices[0] && data.choices[0].message.content;
    if (!msg) return;
    // Open WhatsApp with the narrative
    var fullMsg = "*🏪 " + S.store + " — Aaj Ka Hisaab*
" + new Date().toLocaleDateString("en-IN") + "

" + msg;
    waS(fullMsg);
  })
  .catch(function(err) { console.error("Daily summary GPT error:", err); });
}

function showCreditRisk(cid, amt) {
  var cust=S.custs.find(function(x){return x.id===cid;});
  if(!cust||!S.openAiKey)return;
  var txns=S.udh.filter(function(u){return u.cid===cid;}).sort(function(a,b){return a.id-b.id;});
  var totalDebit=txns.filter(function(u){return u.type==="debit";}).reduce(function(a,u){return a+u.amt;},0);
  var totalCredit=txns.filter(function(u){return u.type==="credit";}).reduce(function(a,u){return a+u.amt;},0);
  var balance=totalDebit-totalCredit;
  var payTimes=[];var pending=[];
  txns.forEach(function(t){
    if(t.type==="debit")pending.push({date:t.date,amt:t.amt});
    else if(t.type==="credit"&&pending.length>0){
      var dd=pending.shift();

function fetchAIInsight(rev, net, billCount, sales, profLabel) {
  var el = document.getElementById("ai-text");
  if (!el) return;

  // Build items summary from today's sales
  var itemCounts = {};
  (sales || []).forEach(function(s) {
    (s.items || []).forEach(function(i) {
      var name = i.name || "Item";
      itemCounts[name] = (itemCounts[name] || 0) + (i.qty || 1);
    });
  });
  var topItems = Object.entries(itemCounts)
    .sort(function(a, b) { return b[1] - a[1]; })
    .slice(0, 5)
    .map(function(x) { return { name: x[0], qty: x[1] }; });

  var payload = {
    date: td(),
    profession: profLabel || "Shop",
    totalSales: rev,
    totalProfit: net,
    billCount: billCount,
    topItems: topItems,
    language: "hindi"
  };

  fetch("https://getaiinsight-wzwuudebea-uc.a.run.app", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(function(res) {
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  })
  .then(function(data) {
    var msg = data.insight || data.message || data.text || data.response || JSON.stringify(data);
    var el2 = document.getElementById("ai-text");
    if (el2) {
      el2.style.animation = "fadeIn .4s ease";
      el2.innerHTML = '<span style="color:#4c1d95">' + msg + '</span>';
    }
  })
  .catch(function(err) {
    console.warn("AI Insight fetch failed:", err);
    var el3 = document.getElementById("ai-text");
    if (el3) {
      // Fallback: generate local insight
      var localMsg = "";
      if (rev === 0) {
        localMsg = "Aaj abhi koi sale nahi hui. Pehla bill banao aur din ki shuruaat karo! 💪";
      } else if (net < 0) {
        localMsg = "Aaj ka kharcha zyaada raha. Expenses check karein aur margins improve karein.";
      } else if (billCount >= 20) {
        localMsg = "Wah! Aaj " + billCount + " bills bane — bahut acha din raha. " + (net > 0 ? "Rs." + Number(net).toLocaleString("en-IN") + " ka faayda hua! 🎉" : "");
      } else if (net > 0) {
        localMsg = "Aaj Rs." + Number(net).toLocaleString("en-IN") + " ka net faayda hua " + billCount + " bills mein. Accha chal raha hai! 👍";
      } else {
        localMsg = "Aaj ka data record ho gaya. Kal aur behtar karein!";
      }
      el3.innerHTML = '<span style="color:#6b21a8">' + localMsg + '</span>';
    }
  });
}

function waReceipt(billNo,sale){

function rSL(){

}

  G("pg-stock").innerHTML='<div class="gp" style="padding-top:0"><div style="display:flex;align-items:center;gap:10px;padding:14px 13px 10px"><button onclick="exST()" style="background:rgba(255,255,255,.2);cursor:pointer;font-size:14px;padding:6px 10px;border-radius:9px;color:#fff;font-weight:700">&#x2190; Back</button><div style="flex:1"><div style="color:#fff;font-size:17px;font-weight:700">&#x1F4CB; Stocktake</div><div style="color:#c4b5fd;font-size:10px">Asli stock gino</div></div><button onclick="stRst()" style="padding:5px 9px;border-radius:9px;font-size:10px;font-weight:700;background:rgba(255,255,255,.2);color:#fff;cursor:pointer">Reset</button></div><div style="padding:0 13px 9px"><input id="st-srch" value="'+es(ST.s)+'" oninput="ST.s=this.value;rSTake()" placeholder="Search..." style="width:100%;padding:9px 13px;border-radius:11px;border:none;outline:none;font-size:13px;background:#fff"/></div><div class="hs" style="gap:6px;padding:0 13px 11px">'+catP+'</div></div><div style="padding:11px 13px 110px">'+(filtered.length===0?'<div style="text-align:center;padding:44px 0;color:#9ca3af">Koi product nahi</div>':rows)+'</div><div style="position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:#fff;box-shadow:0 -2px 16px rgba(0,0,0,.12);padding:11px 13px;z-index:150"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><div id="stfi" style="font-size:12px;color:#6b7280"><span style="font-weight:700;color:#7c3aed">'+counted+'/'+filtered.length+'</span> gine &middot; <span style="font-weight:700;color:'+(changed>0?"#f97316":"#16a34a")+'">'+changed+' change'+(changed!==1?"s":"")+'</span></div><div style="display:flex;gap:8px;font-size:10px;font-weight:700"><span style="color:#ea580c">&#9650; Zyaada</span><span style="color:#dc2626">&#9660; Kam</span><span style="color:#16a34a">&#x2713; Sahi</span></div></div><div style="height:5px;background:#f3f4f6;border-radius:3px;margin-bottom:9px;overflow:hidden"><div id="stfb" style= // BAHI KHATA
function rLedger(){
  var h=subH("&#x1F4D6; Bahi Khata — Roz Ka Hisaab","ga");
  var days=[];for(var i=0;i<30;i++){var d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split("T")[0]);}
  h+='<div style="padding:9px 13px 80px">';
  var gT2=0,gP=0,gB=0;
  days.forEach(function(day){
    var dS=S.sales.filter(s=>s.date===day);if(!dS.length)return;
    var rev=dS.reduce((a,s)=>a+s.total,0),prof=dS.reduce((a,s)=>a+s.profit,0);
    var exp=S.exps.filter(e=>e.date===day).reduce((a,e)=>a+e.amt,0);
    var cashR=dS.filter(s=>s.pt==="cash").reduce((a,s)=>a+s.total,0);
    var upiR=dS.filter(s=>s.pt==="upi").reduce((a,s)=>a+s.total,0);
    var udR=dS.filter(s=>s.pt==="udhar").reduce((a,s)=>a+s.total,0);
    gT2+=rev;gP+=(prof-exp);gB+=dS.length;
    var dObj=new Date(day),isToday=day===td(),isYest=day===new Date(new Date()-86400000).toISOString().split("T")[0];
    var label=isToday?"Aaj":isYest?"Kal":dObj.toLocaleDateString("en-IN",{weekday:"short",day:"numeric",month:"short"});
    h+='<div style="background:#fff;border-radius:13px;padding:13px;margin-bottom:9px;box-shadow:0 1px 5px rgba(0,0,0,.06);border-left:4px solid '+(isToday?"#f97316":isYest?"#6366f1":"#e8d5b7")+'">';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
    h+='<div><div style="font-weight:700;font-size:14px;color:'+(isToday?"#f97316":isYest?"#6366f1":"#1a1a1a")+'">'+label+'</div><div style="font-size:11px;color:#9ca3af">'+dS.length+' bill'+(dS.length>1?"s":"")+'</div></div>';
    h+='<div style="text-align:right"><div style="font-weight:700;font-size:18px">'+fc(rev)+'</div><div style="font-size:12px;color:#16a34a;font-weight:600">Faayda: '+fc(prof-exp)+'</div></div></div>';
    h+='<div style="display:flex;gap:6px;flex-wrap:wrap">';
    if(cashR>0)h+='<span style="font-size:11px;font-weight:700;background:#f0fdf4;color:#16a34a;padding:3px 9px;border-radius:20px">&#x1F4B5; Naqdh '+fc(cashR)+'</span>';
    if(upiR>0)h+='<span style="font-size:11px;font-weight:700;background:#eef2ff;color:#6366f1;padding:3px 9px;border-radius:20px">&#x1F4F2; UPI '+fc(upiR)+'</span>';
    if(udR>0)h+='<span style="font-size:11px;font-weight:700;background:#fffbeb;color:#d97706;padding:3px 9px;border-radius:20px">&#x1F4D2; Udhar '+fc(udR)+'</span>';
    if(exp>0)h+='<span style="font-size:11px;font-weight:700;background:#fef2f2;color:#dc2626;padding:3px 9px;border-radius:20px">&#x1F4B8; Kharcha '+fc(exp)+'</span>';
    h+='</div></div>';
  });
  if(gT2===0){h+='<div style="text-align:center;padding:44px 0"><div style="font-size:44px;margin-bottom:9px">&#x1F4D5;</div><div style="color:#9ca3af;font-size:14px">Koi bhi bill nahi<br>Quick Bill se becho!</div></div>';}
  else{h+='<div style="background:linear-gradient(135deg,#d97706,#b45309);border-radius:14px;padding:14px;margin-bottom:9px"><div style="color:#fde68a;font-size:11px;font-weight:600">Pichhle 30 Din Ka Kul</div><div style="color:#fff;font-size:26px;font-weight:700;margin:4px 0">'+fc(gT2)+'</div><div style="color:#fed7aa;font-size:13px;font-weight:600">Kul Faayda: '+fc(gP)+' &middot; '+gB+' bills</div></div>';}
  h+='</div>';G("pg-more").innerHTML=h;
}

      return '<div style="display:flex;justify-content:space-between;font-size:14px;padding:8px 0;border-bottom:1px solid var(--border)">'
        +'<span style="color:var(--t2);font-weight:600">'+r[0]+'</span>'
        +'<span style="font-weight:700;color:var(--t1)">'+r[1]+'</span></div>';
    }).join("")+'</div>';

  // Reset
  h+='<div class="card" style="margin:0">'
    +'<div style="font-size:15px;font-weight:800;margin-bottom:4px;color:#ef4444">⚠️ Data Reset</div>'
    +'<div style="font-size:13px;color:var(--t2);margin-bottom:14px">Dhyan se karein — wapas nahi aayega</div>'
    +'<button onclick="showRstP()" style="width:100%;padding:13px;border-radius:13px;font-weight:700;font-size:13px;background:#fef2f2;color:#ef4444;border:1.5px solid #fecaca;margin-bottom:10px">Products Default Pe Reset</button>'
    +'<button onclick="showRstA()" style="width:100%;padding:13px;border-radius:13px;font-weight:700;font-size:13px;background:#fef2f2;color:#ef4444;border:1.5px solid #fecaca">Poora Data Mitao</button></div>';

  h+='</div>';
  G("pg-more").innerHTML=h;
}
function svSets(){
  S.store=(G("st-n")||{}).value||"My Shop";
  S.ownerWa=(G("st-wa")||{}).value||"";
  S.upiId=(G("st-upi")||{}).value||"";
  var oaiEl=G("st-oai");if(oaiEl)S.openAiKey=oaiEl.value.trim();
  sA();toast("Settings save ho gayi! ✓");rSets();
  // Schedule daily summary if enabled
  if(S.dailySummary&&S.openAiKey&&S.ownerWa)scheduleDailySummary();
}
function showProfSwitch(){
  var tiles=Object.values(PROFS).map(function(pc){
    var sel=S.prof===pc.id;
    return '<button onclick="switchProf(\''+pc.id+'\')" style="padding:14px;border-radius:16px;display:flex;align-items:center;gap:12px;border:2px solid '+(sel?"var(--p)":"var(--border)")+';background:'+(sel?"var(--pl)":"#fff")+';cursor:pointer;text-align:left">'
      +'<span style="font-size:28px">'+pc.emoji+'</span>'
      +'<div><div style="font-weight:800;font-size:14px;color:'+(sel?"var(--p)":"var(--t1)")+'">'+(sel?"✓ ":"")+pc.label+'</div>'
      +'<div style="font-size:12px;color:var(--t2);margin-top:2px">'+pc.pl+'</div></div></button>';
  }).join("");
  oM("Profession Badlein","<div style='display:flex;flex-direction:column;gap:10px'>"+tiles+"</div>");
}
function switchProf(id){
  if(id===S.prof){cM();return;}
  S.prof=id;
  var defProds=PROF_PRODS[id]||DP;
  S.prods=JSON.parse(JSON.stringify(defProds));
  applyProfTheme();sA();cM();
  toast("Profession changed to "+PROFS[id].label+" "+PROFS[id].emoji);
  S.sub=null;rMoreH();
}
function showRstP(){oM("Products Reset Karein?",'<div style="text-align:center;padding:16px;background:#fef2f2;border-radius:16px;margin-bottom:16px"><div style="font-size:40px;margin-bottom:8px">⚠️</div><div style="font-weight:800;font-size:16px;color:#ef4444">Products reset honge</div><div style="font-size:13px;color:var(--t2);margin-top:6px">Sales aur customers safe rahenge</div></div><button class="pbtn" onclick="rstP()" style="background:#ef4444;margin-bottom:10px">Haan, Reset Karo</button><button class="pbtn" onclick="cM()" style="background:var(--t3);margin-top:0">Nahi</button>');}
function showRstA(){oM("Poora Data Mitao?",'<div style="text-align:center;padding:16px;background:#fef2f2;border-radius:16px;margin-bottom:16px"><div style="font-size:40px;margin-bottom:8px">🚨</div><div style="font-weight:800;font-size:16px;color:#ef4444">Sab kuch delete hoga</div><div style="font-size:13px;color:var(--t2);margin-top:6px">Sales, products, customers — sab kuch</div></div><button class="pbtn" onclick="rstA()" style="background:#ef4444;margin-bottom:10px">Haan, Sab Mitao</button><button class="pbtn" onclick="cM()" style="background:var(--t3);margin-top:0">Nahi</button>');}
function rstP(){
  var defProds=PROF_PRODS[S.prof]||DP;
  S.prods=JSON.parse(JSON.stringify(defProds));
  try{localStorage.removeItem("kp");}catch(e){}
  sA();rSets();uAD();toast("Products reset ho gaye!");
}
function rstA(){
  ["kp","ks","kpu","ke","kc","ku","ksu","kcd","kst","kwa","kupi","kprof","kgst"].forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});
  location.reload();
}

// INIT
function initApp(){
  // Apply profession theme
  if(S.prof) applyProfTheme();
  // Load default products if none saved yet
  if(!S.prods||!S.prods.length){
    S.prods=JSON.parse(JSON.stringify(PROF_PRODS[S.prof]||DP));
  }
  // Start daily summary scheduler if enabled
  if(S.dailySummary&&S.openAiKey&&S.ownerWa)scheduleDailySummary();
  // Use window.render to ensure cross-script access
  if(typeof window.render==="function") window.render();
  else if(typeof render==="function") render();
}

// Called by Firebase module's showApp() after login / auth state
window._showApp=function(){
  var _q=function(id){return document.getElementById(id);};
  var loginEl=_q("login-screen");
  var obEl=_q("onboarding");
  var appEl=_q("app");
  if(loginEl) loginEl.style.display="none";
  if(obEl)    obEl.style.display="none";
  if(appEl)   appEl.style.display="none";

  if(!S.prof){
    // First-time user: show onboarding profession picker
    if(obEl) obEl.style.display="flex";
    return;
  }

  // Returning user: show app
  if(appEl) appEl.style.display="block";
  initApp();
};

// Override the module's showApp
document.addEventListener("DOMContentLoaded",function(){
  // Patch module showApp reference
  if(!S.prof&&!window.currentUserId){
    // Will be shown after login via onAuthStateChanged
  }
});

initApp();
